name: Sync upstream

on:
  schedule:
    # 每天 UTC 00:00 自动同步一次
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/weihong-su/miniQMT.git
          git fetch upstream

      - name: Sync default branch
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main