name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "mkdocs.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # 部署守门：当前仅本地预览（start_docs.bat），暂不公开发布。
    # 未来需上线时，删除此 if 行或改为 true 即可。
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs deps
        run: pip install -r utils/requirements-docs.txt

      - name: Build and deploy
        run: mkdocs gh-deploy --force
